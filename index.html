<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>background-image-cropper — demo</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <p id="intro">
            Each cell's background-image is rewritten to a client-side cropped &amp; scaled
            copy sized to exactly what the browser paints. <strong>Hover</strong> a cell to see
            the original (uncropped) image for comparison — the picture should not move.
            Rows A–F cover every background-attachment × background-origin combination.
        </p>
        <section id="a">
            <div id="a1" data-bg-image-width="300" data-bg-image-height="300"><span></span></div>
            <div id="a2" data-bg-image-width="300" data-bg-image-height="150"><span></span></div>
            <div id="a3" data-bg-image-width="150" data-bg-image-height="300"><span></span></div>
            <div id="a4" data-bg-image-width="150" data-bg-image-height="150"><span></span></div>
        </section>
        <section id="b">
            <div id="b1" data-bg-image-width="300" data-bg-image-height="300"><span></span></div>
            <div id="b2" data-bg-image-width="300" data-bg-image-height="150"><span></span></div>
            <div id="b3" data-bg-image-width="150" data-bg-image-height="300"><span></span></div>
            <div id="b4" data-bg-image-width="150" data-bg-image-height="150"><span></span></div>
        </section>
        <section id="c">
            <div id="c1" data-bg-image-width="300" data-bg-image-height="300"><span></span></div>
            <div id="c2" data-bg-image-width="300" data-bg-image-height="150"><span></span></div>
            <div id="c3" data-bg-image-width="150" data-bg-image-height="300"><span></span></div>
            <div id="c4" data-bg-image-width="150" data-bg-image-height="150"><span></span></div>
        </section>
        <section id="d">
            <div id="d1" data-bg-image-width="300" data-bg-image-height="300"><span></span></div>
            <div id="d2" data-bg-image-width="300" data-bg-image-height="150"><span></span></div>
            <div id="d3" data-bg-image-width="150" data-bg-image-height="300"><span></span></div>
            <div id="d4" data-bg-image-width="150" data-bg-image-height="150"><span></span></div>
        </section>
        <section id="e">
            <div id="e1" data-bg-image-width="300" data-bg-image-height="300"><span></span></div>
            <div id="e2" data-bg-image-width="300" data-bg-image-height="150"><span></span></div>
            <div id="e3" data-bg-image-width="150" data-bg-image-height="300"><span></span></div>
            <div id="e4" data-bg-image-width="150" data-bg-image-height="150"><span></span></div>
        </section>
        <section id="f">
            <div id="f1" data-bg-image-width="300" data-bg-image-height="300"><span></span></div>
            <div id="f2" data-bg-image-width="300" data-bg-image-height="150"><span></span></div>
            <div id="f3" data-bg-image-width="150" data-bg-image-height="300"><span></span></div>
            <div id="f4" data-bg-image-width="150" data-bg-image-height="150"><span></span></div>
        </section>
        <script type="module" src="main.js"></script>
    </body>
</html>
